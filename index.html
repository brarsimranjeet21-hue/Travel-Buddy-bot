<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Vibrant Mesh Gradient Background */
        background: linear-gradient(45deg, #00dbde 0%, #fc00ff 100%);
        background-attachment: fixed;
        overflow: hidden;
    }

    .container {
        width: 90%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 50px 30px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        /* Floating Animation */
        animation: float 4s ease-in-out infinite;
        border: 2px solid rgba(255, 255, 255, 0.5);
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
    }

    h1 {
        /* Gradient Text Style */
        background: -webkit-linear-gradient(#00dbde, #fc00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        font-size: 45px;
        font-weight: 800;
    }

    p {
        color: #444;
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-block;
        padding: 15px 35px;
        background: linear-gradient(to right, #00dbde, #fc00ff);
        color: white;
        text-decoration: none;
        border-radius: 50px;
        transition: 0.4s;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 10px 20px rgba(252, 0, 255, 0.3);
    }

    .btn:hover {
        transform: scale(1.1) rotate(-2deg);
        box-shadow: 0 15px 30px rgba(252, 0, 255, 0.5);
    }

    .chat-note {
        margin-top: 25px;
        color: #888;
        font-size: 14px;
        font-weight: 500;
    }
</style>

<div class="container">
    <h1>Travel Buddy Bot</h1>

    <p>
        Ready for your next adventure? ✈️<br>
        Ask me about destinations, flights, or hidden gems!
    </p>

    <a href="#" class="btn" onclick="event.preventDefault();">Start Chatting</a>

    <div class="chat-note">
        Powered by AI Explorers
    </div>
</div>
