<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBM Watson Chatbot</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container{
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 400px;
    }

    h1{
      font-size: 32px;
      margin-bottom: 15px;
    }

    p{
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .btn{
      display: inline-block;
      padding: 12px 25px;
      background: #ffffff;
      color: #2a5298;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover{
      background: #dbe9ff;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>AI Chat Assistant</h1>
    <p>
      Welcome to the IBM Watson AI Chatbot.<br>
      Click the chat icon below to start chatting.
    </p>

    <a href="#" class="btn">Chat With AI</a>
  </div>

  <!-- IBM Watson Assistant Script -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "542b899e-458b-4b36-a238-1ffe699b0df1",

      // Correct region format
      region: "eu-de",

      serviceInstanceID: "cf514a12-8ff1-4170-a748-3eac73fb9c67",

      onLoad: async (instance) => {
        await instance.render();
      }
    };

    setTimeout(function () {
      const t = document.createElement('script');

      t.src =
        "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
        (window.watsonAssistantChatOptions.clientVersion || 'latest') +
        "/WatsonAssistantChatEntry.js";

      document.head.appendChild(t);
    });
  </script>

</body>
</html>
