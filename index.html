<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watson Assistant Chatbot</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        overflow:hidden;
    }

    .container{
        width:90%;
        max-width:900px;
        background:white;
        border-radius:20px;
        padding:40px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h1{
        color:#1e3c72;
        margin-bottom:15px;
        font-size:40px;
    }

    p{
        color:#555;
        font-size:18px;
        line-height:1.6;
        margin-bottom:20px;
    }

    .btn{
        display:inline-block;
        padding:12px 25px;
        background:#1e3c72;
        color:white;
        text-decoration:none;
        border-radius:30px;
        transition:0.3s;
        font-size:18px;
    }

    .btn:hover{
        background:#2a5298;
        transform:scale(1.05);
    }

    .chat-note{
        margin-top:20px;
        color:#777;
        font-size:15px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>AI Chat Assistant</h1>

    <p>
        Welcome to our smart chatbot assistant.  
        Click the chat icon at the bottom-right corner to start chatting.
    </p>

    <a href="#" class="btn">Start Chatting</a>

    <div class="chat-note">
        Powered by IBM Watson Assistant
    </div>
</div>

<!-- Watson Assistant Script -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "542b899e-458b-4b36-a238-1ffe699b0df1",
    region: "eu-de",
    serviceInstanceID: "cf514a12-8ff1-4170-a748-3eac73fb9c67",

    onLoad: async (instance) => {
      await instance.render();
    }
  };

  setTimeout(function () {
    const t = document.createElement('script');

    t.src =
      "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
      (window.watsonAssistantChatOptions.clientVersion || 'latest') +
      "/WatsonAssistantChatEntry.js";

    document.head.appendChild(t);
  });
</script>

</body>
</html>
